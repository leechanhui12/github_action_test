name: Python CI

on:
  push:
    branches:
      - [cite_start]main  # main 브랜치에 push할 때 실행 [cite: 1502, 1509]
  pull_request:
    branches:
      - [cite_start]main  # main 브랜치로 PR 시 실행 [cite: 1512, 1515]

jobs:
  test:
    [cite_start]runs-on: ubuntu-latest  # 테스트가 실행될 환경 [cite: 1523, 1532]

    steps:
      # 1. GitHub 저장소에서 코드 체크아웃
      - name: Check out code
        [cite_start]uses: actions/checkout@v2 [cite: 1535-1537]

      # 2. 지정된 파이썬 버전 설치
      - name: Set up Python
        [cite_start]uses: actions/setup-python@v4 [cite: 1545, 1558]
        with:
          [cite_start]python-version: '3.9'  # 원하는 Python 버전 [cite: 1547, 1568]

      # 3. 의존성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip [cite: 1551, 1572]
          pip install -r requirements.txt [cite: 1552, 1573]

      # 4. 유닛 테스트 실행
      - name: Run tests
        run: |
          pytest [cite: 1556, 1583]